<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <script>
        // Apply theme before page load to prevent flash
        (function () {
            const theme = localStorage.getItem('bibliodrift_theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | BiblioDrift</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/style-responsive.css">
    <!-- Fonts: Lora (serif) and Source Sans Pro (sans-serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .auth-container {
            max-width: 420px;
            margin: 8rem auto;
            background: var(--book-bg, #fff);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .auth-input {
            width: 100%;
            padding: 1rem;
            margin-bottom: 1.2rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--accent-color);
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Source Sans Pro', sans-serif;
            font-weight: 600;
            font-size: 1.1rem;
            transition: background-color 0.3s ease;
        }

        .auth-btn:hover {
            background: var(--accent-hover);
        }

        .toggle-link {
            display: block;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: underline;
        }

        #nameField {
            display: none;
        }
    </style>
    <link rel="icon" href="../assets/images/biblioDrift_favicon.png" type="image/png">
</head>

<body>
    <header>
        <a href="index.html" class="logo">
            <img style="height: 40px" src="../assets/images/biblioDrift_favicon.png" alt="BiblioDrift Logo">
            <span>BiblioDrift</span>
        </a>
        <div class="header-controls">
            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="Search by mood or feeling...">
                <i class="fa-solid fa-search search-icon"></i>
            </div>
            <nav class="nav-links">
                <div class="tooltip">
                    <a href="index.html">Explore</a>
                    <span class="tooltip-text"><i class="fa-solid fa-wand-magic-sparkles"></i> Discover new books</span>
                </div>
                <div class="tooltip">
                    <a href="library.html">Library</a>
                    <span class="tooltip-text"><i class="fa-solid fa-book"></i> Your personal collection</span>
                </div>
                <div class="tooltip">
                    <a href="chat.html">Chat</a>
                    <span class="tooltip-text"><i class="fa-solid fa-comments"></i> Talk with our AI</span>
                </div>
                <div class="tooltip">
                    <a href="auth.html" class="active">Sign In</a>
                    <span class="tooltip-text"><i class="fa-solid fa-key"></i> Access your account</span>
                </div>
            </nav>
            <button id="themeToggle" class="btn-icon" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main>
        <!-- 
            =============================================================
            Authentication Container
            =============================================================
            This container handles both sign-in and registration.
            It dynamically switches between modes based on user interaction.
            =============================================================
        -->
        <div class="auth-container">
            
            <!-- Dynamic Form Header -->
            <h2 id="authTitle" style="font-family: 'Lora', serif; margin-bottom: 2rem;">
                Welcome Back
            </h2>
            
            <!-- Authentication Form -->
            <form id="authForm" onsubmit="handleAuth(event)">
                
                <!-- Registration-Specific Field (Hidden by default) -->
                <div id="nameField">
                    <input type="text" id="userName" class="auth-input" placeholder="Full Name">
                </div>
                
                <!-- Standard Credentials -->
                <div class="input-group" style="margin-bottom: 1rem;">
                    <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
                </div>
                
                <div class="input-group" style="margin-bottom: 1rem;">
                    <input type="password" id="password" class="auth-input" placeholder="Password" required>
                </div>
                
                <!-- Primary Action Button -->
                <button type="submit" id="submitBtn" class="auth-btn">
                    Sign In
                </button>
            </form>
            
            <!-- Mode Toggle Link -->
            <div class="auth-footer" style="margin-top: 1.5rem;">
                <span id="toggleText" class="toggle-link">
                    No account? Create one.
                </span>
            </div>
            
        </div>
    </main>

    <script src="../js/config.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/app.js"></script>
    <script src="../script/header-scroll.js"></script>
</body>

</html>
