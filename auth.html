<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | BiblioDrift</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Georgia&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
/* Glassmorphic Auth Container - Matches main site */
.auth-container {
    max-width: 420px;
    margin: clamp(4rem, 15vh, 8rem) auto;
    background: 
        var(--book-texture),
        rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 3.5rem 3rem;
    border-radius: 20px;
    box-shadow: 
        var(--shadow-soft),
        0 0 0 1px rgba(255,255,255,0.2);
    text-align: center;
    border: 1px solid var(--glass-border);
    color: var(--text-main);
    position: relative;
    overflow: hidden;
}

.auth-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
}

/* Enhanced Inputs */
.auth-input {
    width: 100%;
    padding: 1.2rem 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    font-family: 'Georgia', serif;
    background: rgba(255, 255, 255, 0.6);
    color: var(--text-main);
    font-size: 1rem;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

.auth-input:focus {
    outline: none;
    background: var(--book-bg);
    box-shadow: 
        0 0 0 3px rgba(212,175,55,0.15),
        var(--shadow-soft);
    transform: translateY(-1px);
}

/* Premium Button */
.auth-btn {
    width: 100%;
    padding: 1.2rem;
    background: linear-gradient(135deg, var(--text-main), var(--wood-dark));
    color: #fff;
    border: none;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    border-radius: 12px;
    font-weight: 500;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    position: relative;
    overflow: hidden;
}

.auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 
        0 10px 25px rgba(44,36,32,0.3),
        0 0 0 1px var(--accent-gold);
    background: linear-gradient(135deg, var(--accent-gold), var(--wood-dark));
}

.auth-btn:active {
    transform: translateY(0);
}

/* Toggle Link */
.toggle-link {
    display: block;
    margin-top: 1.5rem;
    color: var(--text-muted);
    font-size: 0.95rem;
    cursor: pointer;
    padding: 0.8rem 1rem;
    border-radius: 8px;
    transition: all 0.2s ease;
}

.toggle-link:hover {
    background: rgba(212,175,55,0.1);
    color: var(--text-main);
}

/* Main content padding for fixed header */
main {
    padding-top: 100px;
    min-height: calc(100vh - 100px);
}

/* Responsive */
@media (max-width: 480px) {
    .auth-container {
        margin: 2rem 1rem;
        padding: 2.5rem 2rem;
    }
}
</style>

</head>

<body>

    <header>
        <a href="index.html" class="logo">
            <i class="fa-solid fa-book-open"></i> BiblioDrift
        </a>
        <div class="header-controls">
            <div class="search-bar">
                <input type="text" id="searchInput" class="search-input" placeholder="Search for a feeling...">
                <i class="fa-solid fa-search search-icon"></i>
            </div>
            <nav class="nav-links">
                <a href="index.html">Discovery</a>
                <a href="library.html">My Library</a>
                <a href="auth.html" class="active">Sign In</a>
            </nav>
            <button id="themeToggle" class="btn-icon" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </header>

    <main>
        <div class="auth-container">
            <h2 style="margin-bottom: 2rem;">Welcome Back</h2>
            <form onsubmit="handleAuth(event)">
                <input type="email" id="email" class="auth-input" placeholder="Email Address" required>
                <input type="password" class="auth-input" placeholder="Password" required>
                <button type="submit" class="auth-btn">Sign In</button>
            </form>
            <span class="toggle-link">No account? Create one.</span>
        </div>
    </main>

    <script src="js/header-scroll.js"></script>
    <script>
document.addEventListener('DOMContentLoaded', () => {
    // Theme toggle functionality
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;
    
    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'day';
    html.setAttribute('data-theme', savedTheme);
    themeToggle.querySelector('i').className = savedTheme === 'night' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    
    themeToggle.addEventListener('click', () => {
        const currentTheme = html.getAttribute('data-theme');
        const newTheme = currentTheme === 'night' ? 'day' : 'night';
        
        html.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        themeToggle.querySelector('i').className = newTheme === 'night' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    });
    
    // Header scroll effect
    window.addEventListener('scroll', () => {
        const header = document.querySelector('header');
        if (window.scrollY > 50) {
            header.classList.add('shrink');
        } else {
            header.classList.remove('shrink');
        }
    });
});
</script>



</body>

</html>
